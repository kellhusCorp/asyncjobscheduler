name: CI

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        working-directory: src
        run: dotnet restore AsyncJobScheduler.sln

      - name: Build solution
        working-directory: src
        run: dotnet build AsyncJobScheduler.sln --configuration Release --no-restore
